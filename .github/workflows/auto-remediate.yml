name: Auto Security Remediation

on:
  # Allows you to trigger this manually from the GitHub Actions tab whenever you want to fix vulnerabilities
  workflow_dispatch: 

jobs:
  fix-dependencies:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Apply secure overrides and sync lockfile
        run: |
          # Dynamically inject or update overrides in package.json using node
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.overrides = {
              ...pkg.overrides,
              'body-parser': '^2.3.0',
              'brace-expansion': '^1.1.16'
            };
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          # Regenerate package-lock.json automatically
          npm install

      - name: Create Pull Request Automatically
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "security: auto-sync package-lock with overrides"
          branch: auto-security-fix
          title: "🔒 Security: Automated Dependency Vulnerability Fix"
          body: |
            This is an automated pull request created by GitHub Actions to resolve Snyk security vulnerabilities.
            - Added secure version overrides to `package.json`
            - Synchronized `package-lock.json`
          labels: |
            security
            automated-pr